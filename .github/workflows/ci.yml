name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev --group ml_platform

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  download-models:
    name: Download Production Models
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev --group ml_platform

      - name: Download production models
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        run: uv run python src/registry/download_production_models.py

      - name: Upload models artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-models
          path: models/

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [lint, download-models]
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download models artifact
        uses: actions/download-artifact@v4
        with:
          name: production-models
          path: models/

      - name: Set image tag
        id: tag
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/equinelead-api:${{ steps.tag.outputs.short_sha }}
            ${{ secrets.DOCKER_USERNAME }}/equinelead-api:latest

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via Cloud Build
        run: |
          gcloud builds submit \
            --config deployment/cloudbuild.yaml \
            --substitutions=_DOCKERHUB_USERNAME=${{ secrets.DOCKER_USERNAME }},_IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }} \
            --no-source

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run smoke tests
        run: uv run pytest src/api/test_api.py -v
